apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resources
spec:
  validationFailureAction: Enforce 
  rules:
  - name: check-memory-and-cpu
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: "DÉPLOIEMENT REFUSÉ : Tu as oublié de définir les limites (requests/limits) de CPU et RAM pour ton conteneur !"
      pattern:
        spec:
          containers:
          - resources:
              requests:
                memory: "?*"
                cpu: "?*"
              limits:
                memory: "?*"
                cpu: "?*"